name: Generate ReviewNudge Coming Soon site

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "www/**"
      - ".github/workflows/gen-site-html.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: reviewnudge-coming-soon-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out site
        uses: actions/checkout@v7

      - name: Validate static site files
        run: |
          set -euo pipefail

          test -f www/index.html
          test -f www/assets/waitlist.js
          test -f www/assets/waitlist-config.js
          test -f www/assets/pm-viewport-navigation.js

          if grep -R '/www/assets/' www/index.html; then
            echo "::error::www/index.html contains invalid /www/assets paths"
            exit 1
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: www

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
