name: ${STACK}

services:
  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    env_file:
      - "./.env.generated"
    volumes:
      - "./www:/usr/share/nginx/html:ro"
      - "./logs/runtime:/var/log/nginx"
      - "./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro"
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-proxy}"
      - "traefik.http.routers.${STACK}-http.entrypoints=web"
      - "traefik.http.routers.${STACK}-http.priority=10"
      - "traefik.http.routers.${STACK}-http.middlewares=${STACK}-https-redirect"
      - "traefik.http.routers.${STACK}-http.service=${STACK}"
      - "traefik.http.middlewares.${STACK}-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.${STACK}-https-redirect.redirectscheme.permanent=false"
      - "traefik.http.routers.${STACK}-https.rule=Host(`${APP_HOST}` || 'reviewnudge-coming-soon.etal.solutions')"
      - "traefik.http.routers.${STACK}-https.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.${STACK}-https.priority=10"
      - "traefik.http.routers.${STACK}-https.tls=true"
      - "traefik.http.routers.${STACK}-https.service=${STACK}"
      - "traefik.http.services.${STACK}.loadbalancer.server.port=80"

      - "solutions.etal.service=web"
      - "solutions.etal.service_tier=frontend"
      - "solutions.etal.managed_by=${MANAGED_BY}"
      - "solutions.etal.service_lifecycle=${LIFECYCLE}"
      - "solutions.etal.project_id=${PROJECT_ID}" 
      - "solutions.etal.deployment_id=${DEPLOYMENT_ID}"
      - "solutions.etal.stack=${STACK}"
      - "solutions.etal.data_class=${DATA_CLASS}"
      - "solutions.etal.data_lifecycle=${DATA_LIFECYCLE}"

networks:
  proxy:
    external: true
    name: ${TRAEFIK_NETWORK:-proxy}