name: Generate ReviewNudge site HTML

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/gen-site-html.yml"
      - ".portmason-tooling-ref"
      - "deploy/**"
      - "tests/**"
      - "BUILD_NUMBER"
      - "RELEASE_VERSION"
      - "VERSION"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: reviewnudge-site-html
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest

    env:
      PM_VERSION_ROOT: ${{ github.workspace }}/site

    steps:
      - name: Check out website
        uses: actions/checkout@v7
        with:
          path: site
          fetch-depth: 0

      - name: Create CI environment file
        working-directory: site
        env:
          CI_DEPLOY_ENV: ${{ vars.DEPLOY_ENV }}
        run: |
          set -euo pipefail

          : "${CI_DEPLOY_ENV:?Configure the GitHub repository variable DEPLOY_ENV}"

          if [[ ! "${CI_DEPLOY_ENV}" =~ ^[a-z][a-z0-9-]*$ ]]; then
            echo "::error::DEPLOY_ENV contains an invalid value: ${CI_DEPLOY_ENV}"
            exit 1
          fi

          printf 'DEPLOY_ENV=%s\n' "${CI_DEPLOY_ENV}" > .env
          chmod 600 .env

      - name: Load deployment configuration
        id: config
        working-directory: site
        run: |
          set -euo pipefail

          if [[ ! -r .env ]]; then
            echo "::error::Repository .env file is missing or unreadable"
            exit 1
          fi

          set -a
          source .env
          set +a

          : "${DEPLOY_ENV:?DEPLOY_ENV must be set in .env}"

          deploy_root="deploy/${DEPLOY_ENV}"
          site_root="${deploy_root}/www"
          compose_file="${deploy_root}/docker-compose.yml"

          if [[ ! -d "${deploy_root}" ]]; then
            echo "::error::Deployment directory does not exist: ${deploy_root}"
            exit 1
          fi

          if [[ ! -d "${site_root}" ]]; then
            echo "::error::Static site directory does not exist: ${site_root}"
            exit 1
          fi

          if [[ ! -f "${compose_file}" ]]; then
            echo "::error::Docker Compose file does not exist: ${compose_file}"
            exit 1
          fi

          {
            echo "deploy_env=${DEPLOY_ENV}"
            echo "deploy_root=${deploy_root}"
            echo "site_root=${site_root}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "DEPLOY_ENV=${DEPLOY_ENV}"
            echo "DEPLOY_ROOT=${deploy_root}"
            echo "SITE_ROOT=${site_root}"
          } >> "${GITHUB_ENV}"

      - name: Read Portmason tooling revision
        id: portmason-ref
        working-directory: site
        run: |
          set -euo pipefail

          if [[ ! -r .portmason-tooling-ref ]]; then
            echo "::error::.portmason-tooling-ref is missing or unreadable"
            exit 1
          fi

          ref="$(tr -d '[:space:]' < .portmason-tooling-ref)"
          ref="${ref,,}"

          if [[ ! "${ref}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::.portmason-tooling-ref must contain one full 40-character Git commit SHA"
            exit 1
          fi

          echo "sha=${ref}" >> "${GITHUB_OUTPUT}"

      - name: Verify ops-and-sops credentials
        env:
          OPS_AND_SOPS_READ_TOKEN: ${{ secrets.OPS_AND_SOPS_READ_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${OPS_AND_SOPS_READ_TOKEN}" ]]; then
            echo "::error::OPS_AND_SOPS_READ_TOKEN is not configured"
            exit 1
          fi

      - name: Check out ops-and-sops
        uses: actions/checkout@v7
        with:
          repository: domer6811/ops-and-sops
          ref: ${{ steps.portmason-ref.outputs.sha }}
          token: ${{ secrets.OPS_AND_SOPS_READ_TOKEN }}
          path: ops-and-sops
          sparse-checkout: |
            ops/portmason
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Register Portmason tooling
        run: |
          set -euo pipefail

          portmason_share="${GITHUB_WORKSPACE}/ops-and-sops/ops/portmason"

          if [[ ! -d "${portmason_share}" ]]; then
            echo "::error::Portmason tooling directory is missing: ${portmason_share}"
            exit 1
          fi

          if [[ ! -r "${portmason_share}/pm-helpers" ]]; then
            echo "::error::Shared pm-helpers is missing or unreadable: ${portmason_share}/pm-helpers"
            exit 1
          fi

          if [[ ! -x "${portmason_share}/pm-version" ]]; then
            echo "::error::Shared pm-version is missing or not executable: ${portmason_share}/pm-version"
            exit 1
          fi

          echo "${portmason_share}" >> "${GITHUB_PATH}"
          echo "PORTMASON_SHARE=${portmason_share}" >> "${GITHUB_ENV}"

      - name: Verify Portmason tooling
        working-directory: site
        run: |
          set -euo pipefail

          if [[ -e bin/pm-version ]]; then
            echo "::error::Project-local bin/pm-version must not exist; use shared ops-and-sops tooling"
            exit 1
          fi

          expected_pm_version="${GITHUB_WORKSPACE}/ops-and-sops/ops/portmason/pm-version"
          actual_pm_version="$(command -v pm-version)"

          if [[ "${actual_pm_version}" != "${expected_pm_version}" ]]; then
            echo "::error::Unexpected pm-version executable: ${actual_pm_version}"
            echo "::error::Expected: ${expected_pm_version}"
            exit 1
          fi

          expected_tooling_ref="$(tr -d '[:space:]' < .portmason-tooling-ref)"
          expected_tooling_ref="${expected_tooling_ref,,}"
          actual_tooling_ref="$(git -C "${GITHUB_WORKSPACE}/ops-and-sops" rev-parse HEAD)"

          if [[ "${actual_tooling_ref}" != "${expected_tooling_ref}" ]]; then
            echo "::error::Checked-out Portmason revision does not match .portmason-tooling-ref"
            echo "::error::Expected: ${expected_tooling_ref}"
            echo "::error::Actual:   ${actual_tooling_ref}"
            exit 1
          fi

          bash -n "${expected_pm_version}"
          pm-version validate

      - name: Validate ReviewNudge source site
        working-directory: site
        run: |
          set -euo pipefail

          required_files=(
            "${SITE_ROOT}/index.html"
            "${SITE_ROOT}/assets/waitlist.js"
            "${SITE_ROOT}/assets/waitlist-config.js"
            "${SITE_ROOT}/assets/pm-viewport-navigation.js"
          )

          for required_file in "${required_files[@]}"; do
            if [[ ! -f "${required_file}" ]]; then
              echo "::error::Required ReviewNudge file is missing: ${required_file}"
              exit 1
            fi
          done

          if grep -R --line-number '/www/assets/' "${SITE_ROOT}"; then
            echo "::error::The site contains invalid /www/assets paths"
            exit 1
          fi

      - name: Allocate immutable site build
        working-directory: site
        env:
          CI: "true"
        run: |
          set -euo pipefail

          pm-version build allocate --ci

          build_number="$(tr -d '[:space:]' < BUILD_NUMBER)"
          compatibility_version="$(tr -d '[:space:]' < VERSION)"

          if [[ ! "${build_number}" =~ ^[0-9]+$ ]]; then
            echo "::error::BUILD_NUMBER contains an invalid value: ${build_number}"
            exit 1
          fi

          if [[ "${compatibility_version}" != "${build_number}" ]]; then
            echo "::error::VERSION does not match BUILD_NUMBER"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            RELEASE_VERSION \
            BUILD_NUMBER \
            VERSION \
            deploy/*/RELEASE_VERSION \
            deploy/*/BUILD_NUMBER \
            deploy/*/VERSION

          if ! git diff --cached --quiet; then
            git commit -m "chore: allocate ReviewNudge site build ${build_number} [skip ci]"
            git push
          fi

          {
            echo "PM_BUILD_NUMBER=${build_number}"
            echo "PM_SOURCE_COMMIT=$(git rev-parse HEAD)"
          } >> "${GITHUB_ENV}"

      - name: Generate production site HTML
        working-directory: site
        env:
          PM_DEPLOYMENT_ID: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail

          docker run --rm \
            --volume "${GITHUB_WORKSPACE}/site/${SITE_ROOT}:/workspace/www" \
            --volume "${PORTMASON_SHARE}:/workspace/portmason:ro" \
            --env SITE_DIR=/workspace/www \
            --env PORTMASON_SHARE=/workspace/portmason \
            --env GITHUB_ACTIONS=true \
            --env PM_OFFICIAL_BUILD=true \
            --env PM_DEFER_SITE_BUILD_FINALIZE=true \
            --env PM_SOURCE_COMMIT="${PM_SOURCE_COMMIT}" \
            --env PM_SOURCE_DIRTY=false \
            --env PM_DEPLOY_ENV="${DEPLOY_ENV}" \
            --env PM_DEPLOYMENT_ID="${PM_DEPLOYMENT_ID}" \
            python:3.12-alpine \
            sh -lc 'exec python3 "$PORTMASON_SHARE/pm-process-site-partials"'

          PM_OFFICIAL_BUILD=true \
          PM_SOURCE_COMMIT="${PM_SOURCE_COMMIT}" \
          PM_SOURCE_DIRTY=false \
          PM_DEPLOY_ENV="${DEPLOY_ENV}" \
          PM_DEPLOYMENT_ID="${PM_DEPLOYMENT_ID}" \
            pm-version build finalize \
              --site-dir "${GITHUB_WORKSPACE}/site/${SITE_ROOT}" \
              --environment "${DEPLOY_ENV}" \
              --deployment-id "${PM_DEPLOYMENT_ID}"

      - name: Verify Pages artifact
        working-directory: site
        run: |
          set -euo pipefail

          required_metadata=(
            "${SITE_ROOT}/build-info.json"
            "${SITE_ROOT}/deploy-info.json"
            "${SITE_ROOT}/artifact-manifest.json"
          )

          for metadata_file in "${required_metadata[@]}"; do
            if [[ ! -r "${metadata_file}" ]]; then
              echo "::error::Pages artifact metadata is missing or unreadable: ${metadata_file}"
              exit 1
            fi

            mode="$(stat -c '%a' "${metadata_file}")"

            if [[ "${mode}" != "644" ]]; then
              echo "::error::Pages metadata has mode ${mode}; expected 644: ${metadata_file}"
              exit 1
            fi
          done

          pm-version deployment verify --site-dir "${SITE_ROOT}"

          unreadable_files="$(find "${SITE_ROOT}" -type f ! -readable -print)"

          if [[ -n "${unreadable_files}" ]]; then
            echo "::error::Pages artifact contains unreadable files"
            printf '%s\n' "${unreadable_files}" >&2
            exit 1
          fi

          tar -C "${SITE_ROOT}" -cf /dev/null .

      - name: Commit generated ReviewNudge site HTML
        if: ${{ !env.ACT }}
        working-directory: site
        run: |
          set -euo pipefail

          generated_paths=(
            "${SITE_ROOT}/index.html"
          )

          if git diff --quiet -- "${generated_paths[@]}"; then
            echo "ReviewNudge site HTML is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f "${generated_paths[@]}"
          git commit -m "chore: generate ReviewNudge site HTML for build ${PM_BUILD_NUMBER} [skip ci]"
          git push

      - name: Upload GitHub Pages artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/${{ steps.config.outputs.site_root }}

  deploy:
    runs-on: ubuntu-latest
    needs: generate

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        if: ${{ !env.ACT }}
        uses: actions/deploy-pages@v5
