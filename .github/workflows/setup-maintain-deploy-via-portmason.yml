name: setup-maintain-deploy-via-portmason

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

concurrency:
  group: portmason-${{ github.ref }}
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-latest

    outputs:
      runtime_code: ${{ steps.runtime.outputs.runtime_code }}
      is_static: ${{ steps.runtime.outputs.is_static }}
      site_dir: ${{ steps.runtime.outputs.site_dir }}
      image_artifact_name: ${{ steps.persist-static-image.outputs.artifact_name }}

    env:
      PROJECT_DIR: site
      DEPLOY_DIR: site/deploy/prd
      OPS_DIR: ops-and-sops

    steps:
      - name: Check out project
        uses: actions/checkout@v4
        with:
          path: ${{ env.PROJECT_DIR }}
          fetch-depth: 0

      - name: Read pinned Portmason revision
        id: portmason-ref
        working-directory: ${{ env.PROJECT_DIR }}
        shell: bash
        run: |
          set -euo pipefail

          ref_file=".portmason-tooling-ref"

          [[ -r "${ref_file}" ]] || {
            echo "::error::${ref_file} is missing or unreadable"
            exit 1
          }

          ref="$(tr -d '[:space:]' < "${ref_file}")"
          ref="${ref,,}"

          [[ "${ref}" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error::${ref_file} must contain one full 40-character Git commit SHA"
            exit 1
          }

          printf 'sha=%s\n' "${ref}" >> "${GITHUB_OUTPUT}"

      - name: Check out pinned Portmason tooling
        uses: actions/checkout@v4
        with:
          repository: domer6811/ops-and-sops
          ref: ${{ steps.portmason-ref.outputs.sha }}
          token: ${{ secrets.OPS_AND_SOPS_READ_TOKEN }}
          path: ${{ env.OPS_DIR }}
          sparse-checkout: |
            ops/portmason
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Register Portmason
        shell: bash
        run: |
          set -euo pipefail

          portmason_share="${GITHUB_WORKSPACE}/${OPS_DIR}/ops/portmason"

          [[ -d "${portmason_share}" ]] || {
            echo "::error::Portmason directory is missing: ${portmason_share}"
            exit 1
          }

          [[ -x "${portmason_share}/pm-setup" ]] || {
            echo "::error::pm-setup is missing or not executable"
            exit 1
          }

          printf 'PORTMASON_SHARE=%s\n' "${portmason_share}" >> "${GITHUB_ENV}"
          printf '%s\n' "${portmason_share}" >> "${GITHUB_PATH}"

      - name: Run Portmason setup
        working-directory: ${{ env.DEPLOY_DIR }}
        shell: bash
        env:
          GITHUB_ACTIONS: "true"
          PM_OFFICIAL_BUILD: "true"
          PM_SOURCE_COMMIT: ${{ github.sha }}
          PM_SOURCE_DIRTY: "false"
          PM_DEPLOYMENT_ID: github-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail

          "${PORTMASON_SHARE}/pm-setup"

      - name: Resolve runtime outputs
        id: runtime
        working-directory: ${{ env.DEPLOY_DIR }}
        shell: bash
        run: |
          set -euo pipefail

          # Load Portmason's resolved project context rather than duplicating
          # runtime-selection logic in GitHub Actions.
          # shellcheck disable=SC1090
          source "${PORTMASON_SHARE}/pm-helpers" --read-only

          runtime_code="${RUNTIME_CODE:-${RUNTIME_ADAPTER_CODE%%-*}}"
          site_dir="${SITE_DIR:-${PWD}/www}"

          [[ -n "${runtime_code}" ]] || {
            echo "::error::Portmason did not resolve RUNTIME_CODE"
            exit 1
          }

          printf 'runtime_code=%s\n' "${runtime_code}" >> "${GITHUB_OUTPUT}"
          printf 'site_dir=%s\n' "${site_dir}" >> "${GITHUB_OUTPUT}"

          if [[ "${runtime_code}" == "static" ]]; then
            printf 'is_static=true\n' >> "${GITHUB_OUTPUT}"
          else
            printf 'is_static=false\n' >> "${GITHUB_OUTPUT}"
          fi

      - name: Persist static-site container image
        id: persist-static-image
        if: ${{ steps.runtime.outputs.is_static == 'true' }}
        working-directory: ${{ env.DEPLOY_DIR }}
        shell: bash
        env:
          STATIC_IMAGE_SERVICE: ${{ vars.PM_STATIC_IMAGE_SERVICE || 'web' }}
        run: |
          set -euo pipefail

          service="${STATIC_IMAGE_SERVICE}"

          docker compose config --services \
            | grep -Fx -- "${service}" >/dev/null \
            || {
              echo "::error::Static image service is not defined in Compose: ${service}"
              exit 1
            }

          image_id="$(docker compose images -q "${service}" | head -n 1)"

          [[ -n "${image_id}" ]] || {
            echo "::error::No built image was found for Compose service: ${service}"
            exit 1
          }

          safe_repository="$(
            printf '%s' "${GITHUB_REPOSITORY}" \
              | tr '[:upper:]/_' '[:lower:]---' \
              | sed 's/[^a-z0-9.-]/-/g; s/-\{2,\}/-/g'
          )"

          image_tag="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${safe_repository}:sha-${GITHUB_SHA}"
          artifact_name="${safe_repository}-static-image-${GITHUB_SHA}"
          image_archive="${RUNNER_TEMP}/${artifact_name}.tar"

          docker tag "${image_id}" "${image_tag}"
          docker save --output "${image_archive}" "${image_tag}"

          sha256sum "${image_archive}" > "${image_archive}.sha256"

          printf 'artifact_name=%s\n' "${artifact_name}" >> "${GITHUB_OUTPUT}"
          printf 'archive=%s\n' "${image_archive}" >> "${GITHUB_OUTPUT}"
          printf 'checksum=%s\n' "${image_archive}.sha256" >> "${GITHUB_OUTPUT}"

      - name: Upload persisted static-site image
        if: ${{ steps.runtime.outputs.is_static == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.persist-static-image.outputs.artifact_name }}
          path: |
            ${{ steps.persist-static-image.outputs.archive }}
            ${{ steps.persist-static-image.outputs.checksum }}
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Upload GitHub Pages artifact
        if: ${{ steps.runtime.outputs.is_static == 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.runtime.outputs.site_dir }}

  deploy-pages:
    if: ${{ needs.setup.outputs.is_static == 'true' }}
    runs-on: ubuntu-latest
    needs:
      - setup

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
